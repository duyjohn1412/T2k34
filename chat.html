<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#ff4d6d,#ff758f);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:sans-serif;
}

/* khung chat */
.chat-box{
width:350px;
height:500px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
overflow:hidden;
}
/*tn*/
.message{
background:#ffe4ec;
color:#333;
}

/* từng tin nhắn */
.message{
background:linear-gradient(135deg,#ff4d6d,#ff758f);
padding:8px 12px;
margin:6px 0;
border-radius:10px;
color:white;
max-width:80%;
animation:fade 0.25s;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* animation xuất hiện */
@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* ô nhập */
.input-box{
display:flex;
border-top:1px solid rgba(255,255,255,0.1);
background:#111;
}

/* input */
input{
flex:1;
border:none;
padding:12px;
background:transparent;
color:white;
outline:none;
}

/* nút gửi */
button{
border:none;
background:linear-gradient(135deg,#ff4d6d,#ff758f);
padding:12px 16px;
cursor:pointer;
color:white;
font-weight:bold;
transition:0.2s;
}

/* hover */
button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<header>
    <h1>Chatbox 12T2</h1>
    <p>Enjoy it</p>
  </header>
  <nav>
    <a href="index.html">Trang chủ</a>
    <a href="thanhvien.html">Thành viên</a>
    <a href="thanhtich.html">Thành tích và hoạt động</a>
    <a href="lienhe.html">Liên hệ</a>
    <a href="countdown.html">Countdown</a>
    <a href="TKB.html">Thời Khóa Biểu</a>
    <a href="chat.html">Chat</a>
  </nav>
  <section>
<div class="chat-box">

<div id="messages" class="messages"></div>

<div class="input-box">
<input id="msg" placeholder="Nhập tin nhắn...">
<button onclick="send()">Gửi</button>
</div>

</div>
<section>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQ28VHcJVl2e-dokWJ5F5THaN4-hhXz_c",
  authDomain: "t2k34-4e8cf.firebaseapp.com",
  projectId: "t2k34-4e8cf",
  storageBucket: "t2k34-4e8cf.firebasestorage.app",
  messagingSenderId: "848499713759",
  appId: "1:848499713759:web:89771242b4ba241ec8eb6a",
  measurementId: "G-STBMJ1D4ZT"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const messagesDiv = document.getElementById("messages");

window.send = async function(){

const text = document.getElementById("msg").value;

if(text.trim()=="") return;

await addDoc(collection(db,"chat"),{
text:text,
time:Date.now()
});

document.getElementById("msg").value="";

}

const q = query(collection(db,"chat"),orderBy("time"));

onSnapshot(q,(snapshot)=>{

messagesDiv.innerHTML="";

snapshot.forEach(doc=>{

const div=document.createElement("div");
div.className="message";
div.textContent=doc.data().text;

messagesDiv.appendChild(div);

});

messagesDiv.scrollTop=messagesDiv.scrollHeight;

});

</script>

</body>
</html>
