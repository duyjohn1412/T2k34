<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>Chatbox 12T2</h1>
    <p>Enjoy it</p>

  <nav>

  <section id="chatBox">

<h2>Chat lớp</h2>

<div id="messages"></div>

<div class="chat-input">

<input type="text" id="name" placeholder="Tên của bạn (Để trống nếu muốn ẩn danh)">

<input type="text" id="messageInput" placeholder="Nhập tin nhắn...">

<button onclick="sendMessage()">Gửi</button>
<audio id="myAudio" loop>
  <source src="videos/nhac.mp3" type="audio/mpeg">
</audio>
</div>
    <script>
  // Hàm này sẽ thử phát nhạc liên tục cho đến khi người dùng chạm vào màn hình
  function playMusic() {
    var audio = document.getElementById("myAudio");
    audio.play().catch(function(error) {
      console.log("Trình duyệt chặn tự động phát, đợi người dùng tương tác...");
    });
  }

  // Phát nhạc ngay khi click vào bất cứ đâu
  window.addEventListener('click', playMusic, { once: true });
  window.addEventListener('touchstart', playMusic, { once: true }); // Cho điện thoại
</script>


</section>

<script type="module">

/* ===== IMPORT FIREBASE ===== */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


/* ===== FIREBASE CONFIG ===== */

const firebaseConfig = { apiKey: "AIzaSyDQ28VHcJVl2e-dokWJ5F5THaN4-hhXz_c",
 authDomain: "t2k34-4e8cf.firebaseapp.com",
  projectId: "t2k34-4e8cf",
   storageBucket: "t2k34-4e8cf.firebasestorage.app", 
   messagingSenderId: "848499713759",
    appId: "1:848499713759:web:89771242b4ba241ec8eb6a",
     measurementId: "G-STBMJ1D4ZT" };


/* ===== KHỞI TẠO FIREBASE ===== */

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* ===== COLLECTION CHAT ===== */

const messagesRef = collection(db,"chat");


/* ===== LẤY TÊN NGƯỜI DÙNG ===== */

let myName = localStorage.getItem("chatName");


/* ===== GỬI TIN NHẮN ===== */

window.sendMessage = async function(){

  const nameInput = document.getElementById("name");
  const messageInput = document.getElementById("messageInput");

  const name = nameInput.value || myName || "Ẩn danh";
  const text = messageInput.value;

  if(text.trim()=="") return;

  localStorage.setItem("chatName",name);
  myName = name;

  await addDoc(messagesRef,{
    name:name,
    text:text,
    time:Date.now()
  });

  messageInput.value="";
}


/* ===== ENTER ĐỂ GỬI ===== */

document.getElementById("messageInput")
.addEventListener("keypress",function(e){
  if(e.key==="Enter"){
    sendMessage();
  }
});


/* ===== NHẬN TIN NHẮN REALTIME ===== */

const q = query(messagesRef,orderBy("time"));

onSnapshot(q,(snapshot)=>{

  const box = document.getElementById("messages");
  box.innerHTML="";

  snapshot.forEach(doc=>{

    const msg = doc.data();

    const div = document.createElement("div");

    if(msg.name === myName){
      div.className="message me";
    }else{
      div.className="message other";
    }

    div.innerHTML = `
      <strong>${msg.name}</strong>
      ${msg.text}
    `;

    box.appendChild(div);

  });

  box.scrollTop = box.scrollHeight;

});

</script>


</body>
</html>
