<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Sơ đồ lớp</title>

<link rel="stylesheet" href="css/style.css">

<style>

.board{
text-align:center;
background:#b3003c;
color:white;
padding:12px;
border-radius:10px;
margin-bottom:25px;
font-weight:bold;
}

.seatmap{
display:grid;
grid-template-columns:repeat(6,120px);
gap:18px;
justify-content:center;
}

.desk{
width:120px;
height:95px;
background:#fff0f3;
border:2px solid #ff4d6d;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

.student{
cursor:grab;
text-align:center;
}

.student img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
border:2px solid #ff4d6d;
}

.student p{
font-size:13px;
margin-top:4px;
color:#b3003c;
font-weight:600;
}

.seat-control{
text-align:center;
margin-bottom:15px;
}

.seat-control button{
margin:5px;
padding:8px 18px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#b3003c,#ff4d6d);
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>Sơ đồ lớp</h1>
<p>Kéo thả để đổi chỗ</p>
</header>

<nav>

<a href="index.html">Trang chủ</a>
<a href="thanhvien.html">Thành viên</a>
<a href="chat.html">Chat</a>
<a href="sodolop.html">Sơ đồ lớp</a>

</nav>

<main>

<section>

<div class="board">BẢNG</div>

<div class="seat-control">

<button onclick="randomSeat()">🎲 Random</button>
<button onclick="resetSeat()">🔄 Reset</button>

</div>

<div class="seatmap" id="seatmap"></div>

</section>

</main>


<!-- POPUP giống trang thành viên -->

<div id="infoBox" class="modal">

<div class="modal-content">

<span class="close" onclick="closeBox()">&times;</span>

<img id="modalImg" class="avatar">

<h2 id="modalName"></h2>

<p><strong>Chức vụ:</strong> <span id="modalRole"></span></p>
<p><strong>Tổ:</strong> <span id="modalGroup"></span></p>

<hr>

<p><strong>Ngày sinh:</strong> <span id="modalBirth"></span></p>
<p><strong>Funfact:</strong> <span id="modalFact"></span></p>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"

import {
getFirestore,
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"


const firebaseConfig={

apiKey: "AIzaSyDQ28VHcJVl2e-dokWJ5F5THaN4-hhXz_c",
 authDomain: "t2k34-4e8cf.firebaseapp.com",
  projectId: "t2k34-4e8cf",

}

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)



const seatmap=document.getElementById("seatmap")

let students=[]



/* lấy học sinh từ trang thanhvien */

async function loadStudents(){

const res=await fetch("thanhvien.html")

const text=await res.text()

const parser=new DOMParser()

const docHTML=parser.parseFromString(text,"text/html")

const members=docHTML.querySelectorAll(".member")

members.forEach((m,i)=>{

students.push({

id:"student"+i,

name:m.dataset.name,

role:m.dataset.role,

group:m.dataset.group,

birth:m.dataset.birth,

fact:m.dataset.fact,

img:m.dataset.img

})

})

}



function createSeats(){

for(let i=0;i<36;i++){

const desk=document.createElement("div")

desk.className="desk"

desk.dataset.seat=i

desk.ondragover=e=>e.preventDefault()

desk.ondrop=e=>{

e.preventDefault()

const id=e.dataTransfer.getData("text")

const student=document.getElementById(id)

desk.appendChild(student)

/* animation */

student.classList.add("dropEffect")

setTimeout(()=>{

student.classList.remove("dropEffect")

},300)

saveSeats()

}



function createStudents(){

students.forEach((s,i)=>{

const div=document.createElement("div")

div.className="student"

div.id=s.id

div.draggable=true

div.onclick=()=>showInfo(s)

div.ondragstart=e=>{

e.dataTransfer.setData("text",div.id)

}

div.innerHTML=`

<img src="${s.img}">
<p>${s.name}</p>

`

seatmap.children[i].appendChild(div)

})

}



function showInfo(s){

document.getElementById("modalName").innerText=s.name
document.getElementById("modalRole").innerText=s.role
document.getElementById("modalGroup").innerText=s.group
document.getElementById("modalBirth").innerText=s.birth
document.getElementById("modalFact").innerText=s.fact
document.getElementById("modalImg").src=s.img

document.getElementById("infoBox").style.display="block"

}

window.closeBox=function(){

document.getElementById("infoBox").style.display="none"

}



async function saveSeats(){

const data=[]

document.querySelectorAll(".desk").forEach(d=>{

const s=d.querySelector(".student")

data.push(s?s.id:null)

})

await setDoc(doc(db,"seat","class"),{data})

}



async function loadSeats(){

const ref=doc(db,"seat","class")

const snap=await getDoc(ref)

if(!snap.exists()) return

const data=snap.data().data

data.forEach((id,i)=>{

if(id){

seatmap.children[i].appendChild(

document.getElementById(id)

)

}

})

}



window.randomSeat=function(){

const desks=document.querySelectorAll(".desk")

const st=[...document.querySelectorAll(".student")]

st.sort(()=>Math.random()-0.5)

st.forEach((s,i)=>{

setTimeout(()=>{

desks[i].appendChild(s)

s.classList.add("dropEffect")

setTimeout(()=>s.classList.remove("dropEffect"),300)

},i*60)

})

saveSeats()

}



window.resetSeat=function(){

document.querySelectorAll(".student").forEach((s,i)=>{

seatmap.children[i].appendChild(s)

})

saveSeats()

}



async function start(){

await loadStudents()

createSeats()

createStudents()

loadSeats()

}



start()

</script>

</body>
</html>
