
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving button | Jessica</title>
    <link rel="stylesheet" href="css/stylegame.css"/>
</head>
<body>
    <header>
    <h1>Minigame</h1>
    <p>Năm học 2025 – 2026</p>
  </header>
    <nav>
    <a href="index.html">Trang chủ</a>
    <a href="thanhvien.html">Thành viên</a>
    <a href="thanhtich.html">Thành tích và hoạt động</a>
    <a href="lienhe.html">Liên hệ</a>
    <a href="minigame.html">Mini game</a>
  </nav>
    <div class="wrapper">
        <h2 class="question">Chào LÉ</h2>
        <h4 class="question-prompt">Nếu em không chọn hoặc thoát là bạn bỏ qua</h4>
	<h4 class="question-prompt">tui không cố ý chê bạn lé </h4>
        <img class="gif" alt="gif" src="https://media.giphy.com/media/PcCh9x9Pz5d2CriuMQ/giphy.gif"/>
        <div class="btn-group">
            <button class="yes-btn">Bỏ qua😽</button>
            <button class="no-btn">Đéo</button>
        </div>
    </div>
    <script>const wrapper = document.querySelector(".wrapper");
const question = document.querySelector(".question");
const gif = document.querySelector(".gif");
const yesBtn = document.querySelector(".yes-btn");
const noBtn = document.querySelector(".no-btn");
const questionPrompt = document.querySelector(".question-prompt"); // Thêm đoạn này

yesBtn.addEventListener("click", () => {
  question.innerHTML = "Tôi sẽ không bao giờ nói bạn lé nữa 🥺<br>";
  gif.src =
    "https://media.giphy.com/media/vvc1dJPLEU2QOw9cXy/giphy.gif";

  // Ẩn cả hai nút Yes và No
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  questionPrompt.style.display = "none"; // Ẩn dòng chữ khi người dùng nhấn vào nút Yes
});

noBtn.addEventListener("mouseover", () => {
  const noBtnRect = noBtn.getBoundingClientRect();
  const maxX = window.innerWidth - noBtnRect.width;
  const maxY = window.innerHeight - noBtnRect.height;

  const randomX = Math.floor(Math.random() * maxX);
  const randomY = Math.floor(Math.random() * maxY);

  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
});</script>
</body>
</html>
