
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minigame</title>
    <link rel="stylesheet" href="css/stylegame.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    <h1>Minigame</h1>
    <p>Lớp 12 Toán 2 – Trường THPT Chuyên Lê Khiết</p>
  </header>
    <nav>
    <a href="index.html">Trang chủ</a>
    <a href="thanhvien.html">Thành viên</a>
    <a href="thanhtich.html">Thành tích và hoạt động</a>
    <a href="lienhe.html">Liên hệ</a>
    <a href="countdown.html">Countdown</a>
    <a href="minigame.html">Mini game</a>

  </nav>
    <div class="wrapper">
        <h2 class="question">Bạn có yêu lớp 12T2 không?</h2>
        <h4 class="question-prompt">Nếu không chọn hoặc thoát là có</h4>
        <img class="gif" alt="gif" src="https://media.giphy.com/media/PcCh9x9Pz5d2CriuMQ/giphy.gif"/>
        <div class="btn-group">
            <button class="yes-btn">Có😽</button>
            <button class="no-btn">Không</button>
        </div>
    </div>
    <script>
const question = document.querySelector(".question");
const questionPrompt = document.querySelector(".question-prompt");
const yesBtn = document.querySelector(".yes-btn");
const noBtn = document.querySelector(".no-btn");

let step = 0;

const questions = [
    {
        title: "Bạn có thích học lớp 12T2 không?",
        prompt: "Trả lời thật lòng nha 😄"
    },
    {
        title: "Bạn có thấy lớp mình vui không?",
        prompt: "Nghĩ kỹ trước khi trả lời 👀"
    },
    {
        title: "Bạn có yêu lớp 12T2 không?",
        prompt: "Nếu không chọn hoặc thoát là có 😏"
    }
];

function loadQuestion() {
    question.innerHTML = questions[step].title;
    questionPrompt.innerHTML = questions[step].prompt;
}

yesBtn.addEventListener("click", () => {
    step++;

    if (step < questions.length) {
        loadQuestion();
    } else {
        question.innerHTML = "Cảm ơn, chúng tôi cũng yêu bạn hehe ❤️<br>Hãy quay lại trang chủ để xem tiếp nhé";
        yesBtn.style.display = "none";
        noBtn.style.display = "none";
        questionPrompt.style.display = "none";
    }
});

noBtn.addEventListener("click", () => {
    if (step < 2) {
        step++;
        loadQuestion();
    }
});

// Chỉ kích hoạt hiệu ứng chạy nút ở câu cuối
noBtn.addEventListener("mouseover", () => {
    if (step === 2) {
        const noBtnRect = noBtn.getBoundingClientRect();
        const maxX = window.innerWidth - noBtnRect.width;
        const maxY = window.innerHeight - noBtnRect.height;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        noBtn.style.position = "absolute";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
    }
});

loadQuestion();
</script>
</body>
</html>
