<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Seating Chart</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.2/firebase-database.js"></script>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            width: 800px;
            margin: auto;
        }
        .group {
            margin: 20px;
            background-color: #ffcccb;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .desk {
            width: 100px;
            height: 60px;
            border: 2px solid #d95f73;
            background-color: #ff9999;
            margin: 10px;
            border-radius: 5px;
            display: inline-block;
            cursor: move;
        }
    </style>
</head>
<body>
    <h1>Classroom Seating Chart</h1>
    <div class="container" id="seatingChart">
        <!-- Group 1 -->
        <div class="group">
            <h2>Group 1</h2>
            <div class="desk" draggable="true">Desk 1</div>
            <div class="desk" draggable="true">Desk 2</div>
            <div class="desk" draggable="true">Desk 3</div>
            <div class="desk" draggable="true">Desk 4</div>
            <div class="desk" draggable="true">Desk 5</div>
            <div class="desk" draggable="true">Desk 6</div>
        </div>
        <!-- Group 2 -->
        <div class="group">
            <h2>Group 2</h2>
            <div class="desk" draggable="true">Desk 7</div>
            <div class="desk" draggable="true">Desk 8</div>
            <div class="desk" draggable="true">Desk 9</div>
            <div class="desk" draggable="true">Desk 10</div>
            <div class="desk" draggable="true">Desk 11</div>
            <div class="desk" draggable="true">Desk 12</div>
        </div>
        <!-- Group 3 -->
        <div class="group">
            <h2>Group 3</h2>
            <div class="desk" draggable="true">Desk 13</div>
            <div class="desk" draggable="true">Desk 14</div>
            <div class="desk" draggable="true">Desk 15</div>
            <div class="desk" draggable="true">Desk 16</div>
            <div class="desk" draggable="true">Desk 17</div>
            <div class="desk" draggable="true">Desk 18</div>
        </div>
        <!-- Group 4 -->
        <div class="group">
            <h2>Group 4</h2>
            <div class="desk" draggable="true">Desk 19</div>
            <div class="desk" draggable="true">Desk 20</div>
            <div class="desk" draggable="true">Desk 21</div>
            <div class="desk" draggable="true">Desk 22</div>
            <div class="desk" draggable="true">Desk 23</div>
            <div class="desk" draggable="true">Desk 24</div>
        </div>
    </div>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: 'YOUR_API_KEY',
            authDomain: 'YOUR_AUTH_DOMAIN',
            databaseURL: 'YOUR_DATABASE_URL',
            projectId: 'YOUR_PROJECT_ID',
            storageBucket: 'YOUR_STORAGE_BUCKET',
            messagingSenderId: 'YOUR_MESSAGING_SENDER_ID',
            appId: 'YOUR_APP_ID'
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Drag and drop functionality
        const desks = document.querySelectorAll('.desk');

        desks.forEach(desk => {
            desk.addEventListener('dragstart', dragStart);
            desk.addEventListener('dragend', dragEnd);
        });

        function dragStart() {
            setTimeout(() => (this.className = 'invisible'), 0);
        }

        function dragEnd() {
            this.className = 'desk';
        }
    </script>
</body>
</html>
